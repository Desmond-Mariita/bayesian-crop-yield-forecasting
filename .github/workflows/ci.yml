name: ci

on:
  push:
  pull_request:

jobs:
  guidelines-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Single source of truth: the same harness developers run locally. It executes
      # every hard gate (developer guidelines, data cards, notebooks, flake8, black,
      # pytest + >=90% coverage once tests exist) plus advisory mypy, writes the
      # timestamped report, and exits non-zero on a FAIL verdict.
      - name: Verification harness (tools/verify.py)
        run: python tools/verify.py

      - name: Upload verification report + coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: |
            reports/verification/latest.md
            coverage.xml
          if-no-files-found: ignore
